<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – DACHS DATA</title>
  <style>
    :root {
      --black:#0B0B0B; --white:#FFFFFF; --grey:#F5F5F7; --grey-2:#E5E5EA;
      --text-muted:#6B6B70; --blue:#0A2A6B; --blue-hover:#08214F;
    }

    * { box-sizing: border-box; }

    html, body {
      margin:0; padding:0;
      font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
      background:var(--grey); color:var(--black);
    }

    #loading {
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background:var(--white); color:var(--text-muted); z-index:100;
    }

    #loading.hidden { display:none; }
    #dashboard { display:none; min-height:100vh; }
    #dashboard.visible { display:block; }

    .topbar {
      background:var(--white); border-bottom:1px solid var(--grey-2);
      padding:18px 32px; display:flex; justify-content:space-between; align-items:center;
    }

    .brand { font-weight:700; font-size:18px; }
    .brand span { color:var(--blue); }

    .user-area { display:flex; gap:16px; align-items:center; }
    .user-email { font-size:14px; color:var(--text-muted); }

    button {
      cursor:pointer; border-radius:8px; border:1px solid transparent;
      font-size:14px; font-weight:500; padding:9px 16px;
    }

    .btn-primary { background:var(--blue); color:white; }
    .btn-primary:hover { background:var(--blue-hover); }

    .btn-secondary {
      background:white; color:var(--black); border-color:var(--grey-2);
    }

    .container {
      max-width:960px; margin:0 auto; padding:48px 32px;
    }

    h1 { font-size:32px; margin:0 0 8px; }
    .subtitle { color:var(--text-muted); margin:0 0 40px; }

    .card {
      background:white; border:1px solid var(--grey-2);
      border-radius:12px; padding:28px; margin-bottom:20px;
    }

    .card h2 { margin:0 0 6px; font-size:18px; }
    .card p { color:var(--text-muted); margin:0 0 20px; }

    .upload-row {
      display:flex; gap:12px; align-items:center; flex-wrap:wrap;
    }

    input[type="file"] {
      font-size:14px; padding:8px 10px; border:1px solid var(--grey-2);
      border-radius:8px; background:white;
    }
  </style>
</head>

<body>

<div id="loading">Lade Dashboard…</div>

<div id="dashboard">
  <header class="topbar">
    <div class="brand">DACHS <span>DATA</span></div>
    <div class="user-area">
      <span class="user-email" id="userEmail"></span>
      <button class="btn-secondary" id="logoutBtn">Abmelden</button>
    </div>
  </header>

  <main class="container">
    <h1>Willkommen zurück</h1>
    <p class="subtitle">Verwalte deine Forderungen und automatisierten Mahnprozesse.</p>

    <div class="card">
      <h2>Daten importieren</h2>
      <p>Lade deine offenen Forderungen als Excel- oder CSV-Datei hoch.</p>
      <div class="upload-row">
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" />
        <button class="btn-primary" id="uploadBtn">Hochladen</button>
      </div>
    </div>

    <div class="card" id="status">
      <h2>Status</h2>
      <p>Noch keine Daten vorhanden.</p>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
const SUPABASE_URL = "https://mmwhpcopwygabwmszdls.supabase.co";
const SUPABASE_ANON_KEY = "DEIN_ECHTER_ANON_KEY";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const loadingEl = document.getElementById("loading");
const dashboardEl = document.getElementById("dashboard");
const userEmailEl = document.getElementById("userEmail");
const logoutBtn = document.getElementById("logoutBtn");
const fileInput = document.getElementById("fileInput");
const uploadBtn = document.getElementById("uploadBtn");
const statusBox = document.getElementById("status");

async function checkSession() {
  const { data, error } = await supabaseClient.auth.getSession();

  if (error || !data.session) {
    window.location.href = "/login.html";
    return;
  }

  userEmailEl.textContent = data.session.user.email;
  loadingEl.classList.add("hidden");
  dashboardEl.classList.add("visible");

  await loadInvoices();
}

async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "/login.html";
}

async function uploadFile() {
  const file = fileInput.files[0];

  if (!file) {
    alert("Bitte Datei auswählen");
    return;
  }

  const { data: { session } } = await supabaseClient.auth.getSession();

  const safeFileName = file.name.replaceAll(" ", "_");
  const filePath = `${session.user.id}/${Date.now()}_${safeFileName}`;

  const { error: uploadError } = await supabaseClient.storage
    .from("uploads")
    .upload(filePath, file);

  if (uploadError) {
    alert("Upload fehlgeschlagen: " + uploadError.message);
    return;
  }

  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet);

  const invoices = rows.map(row => ({
    company_id: null,
    customer_name: row.kunde,
    invoice_number: row.rechnungsnummer,
    amount: Number(row.betrag),
    due_date: row.faellig_am,
    payment_status: row.status || "offen",
    reminder_stage: "none"
  }));

  const { error: insertError } = await supabaseClient
    .from("invoices")
    .insert(invoices);

  if (insertError) {
    alert("Datei hochgeladen, aber Speichern fehlgeschlagen: " + insertError.message);
    return;
  }

  alert("Upload erfolgreich. Rechnungen wurden gespeichert.");
  await loadInvoices();
}

async function loadInvoices() {
  const { data, error } = await supabaseClient
    .from("invoices")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    statusBox.innerHTML = "<h2>Status</h2><p>Fehler beim Laden der Rechnungen.</p>";
    return;
  }

  renderInvoices(data);
}

function renderInvoices(invoices) {
  if (!invoices || invoices.length === 0) {
    statusBox.innerHTML = "<h2>Status</h2><p>Noch keine Daten vorhanden.</p>";
    return;
  }

  let html = `
    <h2>Importierte Rechnungen</h2>
    <p>${invoices.length} Rechnungen geladen.</p>
    <table style="width:100%; border-collapse:collapse; margin-top:20px;">
      <thead>
        <tr>
          <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Kunde</th>
          <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Rechnung</th>
          <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Betrag</th>
          <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Status</th>
          <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Fällig</th>
        </tr>
      </thead>
      <tbody>
  `;

  invoices.forEach(inv => {
    html += `
      <tr>
        <td style="padding:10px; border-bottom:1px solid #eee;">${inv.customer_name || "-"}</td>
        <td style="padding:10px; border-bottom:1px solid #eee;">${inv.invoice_number || "-"}</td>
        <td style="padding:10px; border-bottom:1px solid #eee;">${inv.amount || "-"} €</td>
        <td style="padding:10px; border-bottom:1px solid #eee;">${inv.payment_status || "-"}</td>
        <td style="padding:10px; border-bottom:1px solid #eee;">${inv.due_date || "-"}</td>
      </tr>
    `;
  });

  html += "</tbody></table>";
  statusBox.innerHTML = html;
}

uploadBtn.addEventListener("click", uploadFile);
logoutBtn.addEventListener("click", logout);

checkSession();
</script>

</body>
</html>
