<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DACHS DATA — Cashflow-Verluste durch manuelle Prozesse stoppen</title>
    <meta
      name="description"
      content="DACHS DATA automatisiert dein Forderungsmanagement und holt dein Geld schneller rein. Pilotprogramm für KMUs in der DACH-Region."
    />
    <link rel="icon" href="dachs-data-logo.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
            colors: {
              brand: {
                blue: "#0A2A6B",
                navy: "#061A45",
                ink: "#0B0B0B",
                surface: "#F6F8FC",
              },
            },
          },
        },
      };
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      }
      .ping-dot::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        background-color: #0a2a6b;
        opacity: 0.6;
        animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
      }
      @keyframes ping {
        75%,
        100% {
          transform: scale(2);
          opacity: 0;
        }
      }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="bg-white text-[#0B0B0B] antialiased" style="font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      const { useState, useEffect } = React;

      // ---------- Primitives ----------
      const Container = ({ children, className = "" }) => (
        <div className={`mx-auto w-full max-w-6xl px-6 md:px-8 ${className}`}>{children}</div>
      );

      const SectionLabel = ({ children, dark = false }) => (
        <span
          className={`inline-flex items-center gap-2 text-xs font-medium uppercase tracking-[0.18em] ${
            dark ? "text-white/60" : "text-[#0A2A6B]"
          }`}
        >
          <span className={`h-px w-6 ${dark ? "bg-white/30" : "bg-[#0A2A6B]/40"}`} aria-hidden />
          {children}
        </span>
      );

      const PrimaryButton = ({ children, href = "#pilot", className = "" }) => (
        <a
          href={href}
          style={{ backgroundColor: "#0A2A6B", color: "#FFFFFF" }}
          className={`group inline-flex items-center justify-center gap-2 rounded-md px-5 py-3 text-sm font-medium shadow-sm transition-all duration-200 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-offset-2 ${className}`}
          onMouseEnter={(e) => (e.currentTarget.style.backgroundColor = "#08245C")}
          onMouseLeave={(e) => (e.currentTarget.style.backgroundColor = "#0A2A6B")}
        >
          {children}
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="transition-transform duration-200 group-hover:translate-x-0.5" aria-hidden>
            <path d="M5 12h14" />
            <path d="m12 5 7 7-7 7" />
          </svg>
        </a>
      );

      const SecondaryButton = ({ children, href = "#case", dark = false, className = "" }) => (
        <a
          href={href}
          className={`inline-flex items-center justify-center gap-2 rounded-md px-5 py-3 text-sm font-medium transition-colors duration-200 ${
            dark
              ? "border border-white/15 text-white hover:bg-white/5"
              : "border border-black/10 text-[#0B0B0B] hover:bg-black/[0.03]"
          } ${className}`}
        >
          {children}
        </a>
      );

      // ---------- Logo (inline SVG — crisp, predictable, theme-aware) ----------
      const Logo = ({ dark = false, size = "sm" }) => {
        const color = dark ? "#FFFFFF" : "#0A2A6B";
        const height = size === "md" ? 76 : 38;

        return (
          <a
            href="#top"
            aria-label="DACHS DATA — Startseite"
            style={{ display: "inline-flex", alignItems: "center", color, lineHeight: 0 }}
          >
            <svg
              viewBox="0 0 240 110"
              height={height}
              xmlns="http://www.w3.org/2000/svg"
              style={{ display: "block", overflow: "visible" }}
              aria-hidden="true"
            >
              <text
                x="120"
                y="55"
                textAnchor="middle"
                fontFamily='Inter, "Helvetica Neue", Arial, sans-serif'
                fontWeight="800"
                fontSize="48"
                letterSpacing="4"
                fill="none"
                stroke="currentColor"
                strokeWidth="1.6"
              >
                DACHS
              </text>
              <text
                x="120"
                y="100"
                textAnchor="middle"
                fontFamily='Inter, "Helvetica Neue", Arial, sans-serif'
                fontWeight="800"
                fontSize="30"
                letterSpacing="10"
                fill="currentColor"
              >
                DATA
              </text>
            </svg>
          </a>
        );
      };

      // ---------- Nav ----------
      const Nav = () => {
        const [scrolled, setScrolled] = useState(false);
        useEffect(() => {
          const onScroll = () => setScrolled(window.scrollY > 8);
          onScroll();
          window.addEventListener("scroll", onScroll, { passive: true });
          return () => window.removeEventListener("scroll", onScroll);
        }, []);

        const linkClass = "text-sm text-[#0B0B0B]/70 transition-colors hover:text-[#0B0B0B]";

        return (
          <header
            className={`fixed inset-x-0 top-0 z-50 transition-all duration-300 ${
              scrolled ? "border-b border-black/5 bg-white/80 backdrop-blur-md" : "border-b border-transparent bg-transparent"
            }`}
          >
            <Container className="flex h-16 items-center justify-between">
              <Logo />
              <nav className="hidden items-center gap-8 md:flex">
                <a href="#problem" className={linkClass}>Problem</a>
                <a href="#loesung" className={linkClass}>Lösung</a>
                <a href="#case" className={linkClass}>Case Study</a>
                <a href="#ablauf" className={linkClass}>Ablauf</a>
              </nav>
              <PrimaryButton href="#pilot" className="hidden md:inline-flex">Pilot starten</PrimaryButton>
            </Container>
          </header>
        );
      };

      // ---------- Hero ----------
      const Hero = () => (
        <section id="top" className="relative overflow-hidden pt-32 pb-24 md:pt-40 md:pb-32">
          <div
            className="pointer-events-none absolute inset-0 -z-10 opacity-[0.5]"
            style={{
              backgroundImage:
                "linear-gradient(to right, rgba(11,11,11,0.04) 1px, transparent 1px), linear-gradient(to bottom, rgba(11,11,11,0.04) 1px, transparent 1px)",
              backgroundSize: "64px 64px",
              maskImage: "radial-gradient(ellipse at center, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 75%)",
              WebkitMaskImage: "radial-gradient(ellipse at center, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 75%)",
            }}
            aria-hidden
          />
          <div
            className="pointer-events-none absolute left-1/2 top-0 -z-10 h-[480px] w-[920px] -translate-x-1/2 rounded-full opacity-[0.35] blur-3xl"
            style={{ background: "radial-gradient(closest-side, #0A2A6B, transparent)" }}
            aria-hidden
          />

          <Container>
            <div className="mx-auto max-w-3xl text-center">
              <span
                className="inline-flex items-center gap-2 rounded-full px-3 py-1 text-xs font-medium shadow-sm"
                style={{ borderWidth: "1px", borderColor: "rgba(10,42,107,0.15)", backgroundColor: "rgba(10,42,107,0.04)", color: "#0A2A6B" }}
              >
                <span className="relative flex h-1.5 w-1.5 items-center justify-center">
                  <span className="ping-dot" aria-hidden></span>
                  <span className="relative inline-flex h-1.5 w-1.5 rounded-full" style={{ backgroundColor: "#0A2A6B" }} aria-hidden />
                </span>
                Pilotprogramm 2026 — jetzt verfügbar
              </span>

              <h1 className="mt-7 text-balance text-4xl font-semibold tracking-tight text-[#0B0B0B] md:text-6xl md:leading-[1.05]">
                Stoppt Cashflow-Verluste durch <span style={{ color: "#0A2A6B" }}>manuelle Prozesse</span>
              </h1>

              <p className="mx-auto mt-6 max-w-2xl text-pretty text-base text-[#0B0B0B]/65 md:text-lg">
                Wir automatisieren dein Forderungsmanagement und holen dein Geld schneller rein.
              </p>

              <div className="mt-10 flex flex-col items-center justify-center gap-3 sm:flex-row">
                <PrimaryButton href="#pilot">Pilot starten</PrimaryButton>
                <SecondaryButton href="#case">Fallbeispiel ansehen</SecondaryButton>
              </div>

              <p className="mt-10 text-xs uppercase tracking-[0.18em] text-[#0B0B0B]/40">
                Vertraut von Finance-Teams in der DACH-Region
              </p>
            </div>
          </Container>
        </section>
      );

      // ---------- Problem ----------
      const ProblemCard = ({ icon, title, body }) => (
        <div className="group relative rounded-xl border border-black/10 bg-white p-7 transition-all duration-300 hover:-translate-y-0.5 hover:shadow-[0_10px_40px_-12px_rgba(10,42,107,0.25)]" style={{}}
          onMouseEnter={(e) => (e.currentTarget.style.borderColor = "rgba(10,42,107,0.3)")}
          onMouseLeave={(e) => (e.currentTarget.style.borderColor = "rgba(0,0,0,0.1)")}
        >
          <div className="flex h-10 w-10 items-center justify-center rounded-lg text-white shadow-[0_4px_16px_-4px_rgba(10,42,107,0.5)]" style={{ backgroundColor: "#0A2A6B" }}>
            {icon}
          </div>
          <h3 className="mt-5 text-lg font-semibold tracking-tight text-[#0B0B0B]">{title}</h3>
          <p className="mt-2 text-sm leading-relaxed text-[#0B0B0B]/60">{body}</p>
        </div>
      );

      const Problem = () => (
        <section id="problem" className="scroll-mt-24 border-t border-black/5 bg-white py-24 md:py-32">
          <Container>
            <div className="max-w-2xl">
              <SectionLabel>Das Problem</SectionLabel>
              <h2 className="mt-4 text-3xl font-semibold tracking-tight text-[#0B0B0B] md:text-4xl">
                Jeder Tag Verzug kostet dich Liquidität.
              </h2>
              <p className="mt-4 text-base text-[#0B0B0B]/60">
                Forderungsmanagement ist in den meisten KMUs ein Flickenteppich aus Excel, E-Mails und Erinnerungen.
                Das Ergebnis ist messbar — und teuer.
              </p>
            </div>

            <div className="mt-14 grid gap-5 md:grid-cols-3">
              <ProblemCard
                icon={
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden>
                    <circle cx="12" cy="12" r="9" />
                    <path d="M12 7v5l3 2" />
                  </svg>
                }
                title="Verspätete Zahlungen"
                body="Rechnungen bleiben offen, weil niemand systematisch nachfasst. Der DSO steigt, oft ohne dass es jemand merkt."
              />
              <ProblemCard
                icon={
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden>
                    <path d="M4 6h16M4 12h16M4 18h10" />
                  </svg>
                }
                title="Manueller Aufwand"
                body="Buchhaltung verbringt Stunden mit Listen, Mahnungen und Telefonaten — Zeit, die im Tagesgeschäft fehlt."
              />
              <ProblemCard
                icon={
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden>
                    <rect x="3" y="6" width="18" height="13" rx="2" />
                    <path d="M3 10h18M8 15h2" />
                  </svg>
                }
                title="Gebundene Liquidität"
                body="Geld, das auf Kundenkonten liegt statt im Unternehmen — und damit nicht für Wachstum, Lager oder Löhne arbeitet."
              />
            </div>
          </Container>
        </section>
      );

      // ---------- Solution ----------
      const SolutionPillar = ({ index, title, body }) => (
        <div className="rounded-xl border border-white/[0.08] bg-white/[0.04] p-7 backdrop-blur-sm transition-all duration-300 hover:border-white/[0.15] hover:bg-white/[0.06]">
          <div className="flex items-center gap-3">
            <span className="flex h-7 w-7 items-center justify-center rounded-md bg-white/10 text-xs font-medium text-white">
              {index}
            </span>
            <span className="text-xs uppercase tracking-[0.18em] text-white/50">Pillar {index}</span>
          </div>
          <h3 className="mt-5 text-lg font-semibold tracking-tight text-white">{title}</h3>
          <p className="mt-2 text-sm leading-relaxed text-white/60">{body}</p>
        </div>
      );

      const Solution = () => (
        <section id="loesung" className="scroll-mt-24 py-24 md:py-32" style={{ backgroundColor: "#061A45" }}>
          <Container>
            <div className="max-w-2xl">
              <SectionLabel dark>Die Lösung</SectionLabel>
              <h2 className="mt-4 text-3xl font-semibold tracking-tight text-white md:text-4xl">
                Forderungsmanagement, das sich selbst um sich kümmert.
              </h2>
              <p className="mt-4 text-base text-white/60">
                DACHS DATA verbindet deine Rechnungsdaten mit klar definierten Mahnstufen und einem Cashflow-Cockpit.
                Du behältst die Kontrolle — ohne den manuellen Aufwand.
              </p>
            </div>

            <div className="mt-14 grid gap-5 md:grid-cols-3">
              <SolutionPillar index="01" title="Automatisiertes Forderungsmanagement" body="Offene Posten werden automatisch importiert, klassifiziert und priorisiert — täglich, ohne Excel-Pflege." />
              <SolutionPillar index="02" title="Systematische Mahnprozesse" body="Definierte Mahnstufen, automatische Trigger, persönliche Ansprache. Kein Kunde wird vergessen, kein Ton zu hart." />
              <SolutionPillar index="03" title="Bessere Cashflow-Steuerung" body="Live-Dashboards zeigen, wo dein Geld steht, was sich verbessert — und welche Hebel den größten Effekt haben." />
            </div>
          </Container>
        </section>
      );

      // ---------- Case Study ----------
      const Stat = ({ value, label, accent = false }) => (
        <div
          className="rounded-xl border p-7"
          style={{
            borderColor: accent ? "#0A2A6B" : "rgba(0,0,0,0.1)",
            backgroundColor: accent ? "#0A2A6B" : "#FFFFFF",
            color: accent ? "#FFFFFF" : "#0B0B0B",
          }}
        >
          <div className="text-3xl font-semibold tracking-tight md:text-4xl" style={{ color: accent ? "#FFFFFF" : "#0B0B0B" }}>
            {value}
          </div>
          <div className="mt-2 text-sm" style={{ color: accent ? "rgba(255,255,255,0.75)" : "rgba(11,11,11,0.6)" }}>
            {label}
          </div>
        </div>
      );

      const CaseStudy = () => (
        <section id="case" className="scroll-mt-24 border-t border-black/5 py-24 md:py-32" style={{ backgroundColor: "#F6F8FC" }}>
          <Container>
            <div className="grid gap-12 md:grid-cols-12 md:gap-10">
              <div className="md:col-span-5">
                <SectionLabel>Case Study</SectionLabel>
                <h2 className="mt-4 text-3xl font-semibold tracking-tight text-[#0B0B0B] md:text-4xl">
                  Was 3 Tage Verzug wirklich kosten.
                </h2>
                <p className="mt-4 text-base text-[#0B0B0B]/60">
                  Ein typisches Mittelstandsszenario: ein vergleichsweise gesunder Zahlungsfluss — und trotzdem fast eine{" "}
                  <span className="font-medium text-[#0B0B0B]">halbe Million Euro pro Jahr</span> unnötig gebundenes Kapital.
                </p>
                <p className="mt-3 text-sm text-[#0B0B0B]/50">
                  Die Zahlen unten zeigen, wie sich kleine Verzögerungen über das Jahr aufaddieren.
                </p>
              </div>

              <div className="md:col-span-7">
                <div className="grid gap-4 sm:grid-cols-2">
                  <Stat value="500.000 €" label="Monatliches Rechnungsvolumen" />
                  <Stat value="3 Tage" label="Durchschnittliche Verzögerung" />
                  <Stat value="≈ 50.000 €" label="Gebundene Liquidität pro Monat" />
                  <Stat value="≈ 600.000 €" label="Gebundene Liquidität pro Jahr" accent />
                </div>
                <p className="mt-5 text-xs text-[#0B0B0B]/45">
                  Beispielrechnung. Reale Werte hängen von Zahlungsbedingungen, Branche und Mahnprozess ab.
                </p>
              </div>
            </div>
          </Container>
        </section>
      );

      // ---------- How It Works ----------
      const Step = ({ number, title, body, last = false }) => (
        <div className="relative flex-1">
          <div className="flex items-center gap-3">
            <span className="flex h-9 w-9 items-center justify-center rounded-full text-sm font-semibold text-white shadow-[0_4px_16px_-4px_rgba(10,42,107,0.5)]" style={{ backgroundColor: "#0A2A6B" }}>
              {number}
            </span>
            {!last && (
              <span className="hidden h-px flex-1 md:block" style={{ background: "linear-gradient(to right, rgba(10,42,107,0.3), transparent)" }} aria-hidden />
            )}
          </div>
          <h3 className="mt-5 text-lg font-semibold tracking-tight text-[#0B0B0B]">{title}</h3>
          <p className="mt-2 max-w-xs text-sm leading-relaxed text-[#0B0B0B]/60">{body}</p>
        </div>
      );

      const HowItWorks = () => (
        <section id="ablauf" className="scroll-mt-24 border-t border-black/5 bg-white py-24 md:py-32">
          <Container>
            <div className="max-w-2xl">
              <SectionLabel>So funktioniert's</SectionLabel>
              <h2 className="mt-4 text-3xl font-semibold tracking-tight text-[#0B0B0B] md:text-4xl">
                In drei Schritten zu automatisiertem Cashflow.
              </h2>
            </div>

            <div className="mt-14 flex flex-col gap-12 md:flex-row md:gap-8">
              <Step number="1" title="Daten importieren" body="Du lädst deine offenen Posten als Excel oder CSV hoch — oder verbindest dein ERP direkt. Setup in unter 30 Minuten." />
              <Step number="2" title="System analysiert offene Forderungen" body="DACHS DATA klassifiziert nach Fälligkeit, Risiko und Kundensegment. Du siehst sofort, wo Liquidität blockiert ist." />
              <Step number="3" title="Automatisierte Mahnprozesse starten" body="Definierte Mahnstufen laufen automatisch — per E-Mail, Brief oder Telefon-Trigger. Du behältst jederzeit die Kontrolle." last />
            </div>
          </Container>
        </section>
      );

      // ---------- Final CTA ----------
      const FinalCTA = () => (
        <section id="pilot" className="scroll-mt-24 relative overflow-hidden py-24 md:py-32" style={{ backgroundColor: "#061A45" }}>
          <div
            className="pointer-events-none absolute inset-x-0 top-0 -z-0 h-[520px] opacity-60 blur-3xl"
            style={{ background: "radial-gradient(ellipse at top, rgba(10,42,107,0.9), transparent 65%)" }}
            aria-hidden
          />
          <Container className="relative">
            <div className="mx-auto max-w-3xl text-center">
              <SectionLabel dark>Pilotprogramm</SectionLabel>
              <h2 className="mt-5 text-balance text-3xl font-semibold tracking-tight text-white md:text-5xl md:leading-[1.1]">
                Starte deinen 30-Tage-Pilot und finde heraus, wie viel Cash in deinem Unternehmen gebunden ist.
              </h2>
              <p className="mx-auto mt-5 max-w-xl text-base text-white/60">
                Klare Analyse, sofortige Hebel, messbare Resultate — innerhalb eines Monats.
              </p>
              <div className="mt-10 flex flex-col items-center justify-center gap-3 sm:flex-row">
                <PrimaryButton href="#kontakt">Jetzt Pilot starten</PrimaryButton>
                <SecondaryButton href="#kontakt" dark>Demo vereinbaren</SecondaryButton>
              </div>
              <p className="mt-6 text-xs uppercase tracking-[0.18em] text-white/40">
                Keine Vertragsbindung · Setup in unter 30 Minuten
              </p>
            </div>
          </Container>
        </section>
      );

      // ---------- Footer ----------
      const Footer = () => (
        <footer id="kontakt" className="border-t border-white/5 py-12" style={{ backgroundColor: "#061A45" }}>
          <Container className="flex flex-col items-start justify-between gap-6 md:flex-row md:items-center">
            <div className="flex flex-col gap-3">
              <Logo dark />
              <p className="text-xs text-white/40">© {new Date().getFullYear()} DACHS DATA. Alle Rechte vorbehalten.</p>
            </div>
            <div className="flex flex-col gap-2 md:flex-row md:items-center md:gap-8">
              <a href="mailto:hello@dachsdata.com" className="text-sm text-white/70 transition-colors hover:text-white">
                hello@dachsdata.com
              </a>
              <a href="#impressum" className="text-xs text-white/40 transition-colors hover:text-white/70">Impressum</a>
              <a href="#datenschutz" className="text-xs text-white/40 transition-colors hover:text-white/70">Datenschutz</a>
            </div>
          </Container>
        </footer>
      );

      // ---------- Page ----------
      function LandingPage() {
        return (
          <div className="min-h-screen bg-white font-sans text-[#0B0B0B] antialiased selection:bg-[#0A2A6B] selection:text-white">
            <Nav />
            <main>
              <Hero />
              <Problem />
              <Solution />
              <CaseStudy />
              <HowItWorks />
              <FinalCTA />
            </main>
            <Footer />
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<LandingPage />);
    </script>
  </body>
</html>
