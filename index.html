<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />

</head>

<body class="bg-white text-black">
<div id="root"></div>

<script type="text/babel">

const PrimaryButton = ({ children }) => (
  <button
    onClick={() => window.location.href = "/login.html"}
    style={{ backgroundColor: "#0A2A6B", color: "white" }}
    className="px-6 py-3 rounded-md text-sm font-medium hover:opacity-90 transition"
  >
    {children}
  </button>
)

function LandingPage() {
  return (
    <div>

      {/* HERO */}
      <section className="text-center py-32">
        <h1 className="text-5xl font-bold mb-6">
          Stoppt Cashflow-Verluste
        </h1>

        <p className="text-lg mb-10">
          Automatisiertes Forderungsmanagement für KMUs
        </p>

        <PrimaryButton>Pilot starten</PrimaryButton>
      </section>

      {/* PROBLEM */}
      <section className="py-24 text-center">

          Das Problem

        <p className="max-w-xl mx-auto text-gray-600">
          Rechnungen werden zu spät bezahlt. Liquidität geht verloren.

      </section>

      {/* SOLUTION */}
      <section className="py-24 text-center bg-gray-100">
        <h2 className="text-3xl font-semibold mb-6">
          Die Lösung
        </h2>

        <p className="max-w-xl mx-auto text-gray-600">
          DACHS DATA automatisiert dein Forderungsmanagement.

          Starte jetzt
        </h2>

        <PrimaryButton>Jetzt Pilot starten</PrimaryButton>
      </section>

    </div>

}

ReactDOM.createRoot(document.getElementById("root")).render(<LandingPage />)

</script>

</body>
</html>
